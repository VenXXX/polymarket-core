[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

# Test configuration
test = "contracts"
fs_permissions = [{ access = "read", path = "./" }]

# Fuzz testing
fuzz_runs = 256
fuzz_max_fail_rejects = 64

# Gas reports
gas_reports = ["PredictionMarket"]

[profile.ci]
fuzz_runs = 1000
